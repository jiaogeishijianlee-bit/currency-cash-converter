<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>货现转换计算</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #68707d;
      --line: #d9dee7;
      --panel: #ffffff;
      --paper: #f5f7fa;
      --accent: #116b5f;
      --accent-soft: #dff3ed;
      --warn: #9a4c00;
      --warn-soft: #fff1dc;
      --blue: #244f8f;
      --blue-soft: #e5eefb;
      --shadow: 0 14px 35px rgba(31, 41, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(17, 107, 95, 0.11), rgba(36, 79, 143, 0.08) 45%, rgba(154, 76, 0, 0.08)),
        var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      font-weight: 780;
    }

    .subhead {
      margin: 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .formula-pill {
      flex: 0 0 auto;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .panel {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel.wide {
      grid-column: 1 / -1;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .input-row {
      display: flex;
      align-items: center;
      min-height: 46px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      padding: 12px;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .suffix {
      flex: 0 0 auto;
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-left: 1px solid var(--line);
      color: var(--muted);
      background: #f9fafc;
      font-weight: 750;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f7;
    }

    .segmented button {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font: inherit;
      font-weight: 760;
      cursor: pointer;
    }

    .segmented button.active {
      color: var(--accent);
      background: #fff;
      box-shadow: 0 1px 4px rgba(17, 24, 39, 0.08);
    }

    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      background: var(--blue-soft);
      border: 1px solid rgba(36, 79, 143, 0.18);
    }

    .result strong {
      display: block;
      margin-bottom: 6px;
      color: var(--blue);
      font-size: 13px;
    }

    .value {
      overflow-wrap: anywhere;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .formula {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .simulation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      min-width: 0;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .metric span {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .metric b {
      display: block;
      overflow-wrap: anywhere;
      font-size: 21px;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .metric.warning {
      border-color: rgba(154, 76, 0, 0.28);
      background: var(--warn-soft);
    }

    .metric.warning span,
    .metric.warning b {
      color: var(--warn);
    }

    .note {
      margin: 14px 0 0;
      padding: 12px 13px;
      border-left: 4px solid var(--warn);
      border-radius: 6px;
      background: rgba(255, 241, 220, 0.72);
      color: #6d3d0a;
      font-size: 13px;
      line-height: 1.6;
    }

    .error {
      margin-top: 8px;
      min-height: 18px;
      color: #b3261e;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 820px) {
      header,
      .layout,
      .simulation-grid,
      .mini-results {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .formula-pill {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>货现转换计算</h1>
        <p class="subhead">把货币点位和现金点位互相换算，并模拟账户币与现金之间的输入、反推结果。</p>
      </div>
      <div class="formula-pill">货币点位 / (1 + 货币点位) = 现金点位</div>
    </header>

    <section class="layout" aria-label="货现转换计算器">
      <article class="panel">
        <div class="panel-head">
          <h2>货币点位 → 现金点位</h2>
          <span class="badge">M→C</span>
        </div>
        <div class="controls">
          <label>
            输入货币点位
            <div class="input-row">
              <input id="moneyPoint" type="number" inputmode="decimal" step="0.0001" value="25" min="0">
              <span class="suffix modeSuffix">%</span>
            </div>
          </label>
        </div>
        <div class="result">
          <strong>现金点位</strong>
          <div class="value" id="cashPointFromMoney">--</div>
          <div class="formula" id="moneyToCashFormula">--</div>
        </div>
        <div class="error" id="moneyPointError"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>现金点位 → 货币点位</h2>
          <span class="badge">C→M</span>
        </div>
        <div class="controls">
          <label>
            输入现金点位
            <div class="input-row">
              <input id="cashPoint" type="number" inputmode="decimal" step="0.0001" value="20" min="0">
              <span class="suffix modeSuffix">%</span>
            </div>
          </label>
        </div>
        <div class="result">
          <strong>货币点位</strong>
          <div class="value" id="moneyPointFromCash">--</div>
          <div class="formula" id="cashToMoneyFormula">--</div>
        </div>
        <div class="error" id="cashPointError"></div>
      </article>

      <article class="panel wide">
        <div class="panel-head">
          <h2>账户币 / 现金模拟</h2>
          <div class="segmented" role="group" aria-label="输入模式">
            <button type="button" id="percentMode" class="active">百分比</button>
            <button type="button" id="decimalMode">小数</button>
          </div>
        </div>

        <div class="simulation-grid">
          <div>
            <label>
              输入账户币
              <div class="input-row">
                <input id="accountCoins" type="number" inputmode="decimal" step="0.01" value="10000" min="0">
                <span class="suffix">币</span>
              </div>
            </label>
            <div class="mini-results">
              <div class="metric">
                <span>账户币 / (1 + 货币点位)</span>
                <b id="cashByMoneyPoint">--</b>
              </div>
              <div class="metric">
                <span>账户币 × 现金点位</span>
                <b id="cashByCashPoint">--</b>
              </div>
              <div class="metric warning">
                <span>两种现金差值</span>
                <b id="cashDifference">--</b>
              </div>
            </div>
          </div>

          <div>
            <label>
              输入目标现金
              <div class="input-row">
                <input id="targetCash" type="number" inputmode="decimal" step="0.01" value="8000" min="0">
                <span class="suffix">现金</span>
              </div>
            </label>
            <div class="mini-results">
              <div class="metric">
                <span>现金 × (1 + 货币点位)</span>
                <b id="coinsByMoneyPoint">--</b>
              </div>
              <div class="metric">
                <span>现金 / 现金点位</span>
                <b id="coinsByCashPoint">--</b>
              </div>
              <div class="metric warning">
                <span>两种账户币差值</span>
                <b id="coinDifference">--</b>
              </div>
            </div>
          </div>
        </div>

        <p class="note" id="consistencyNote">--</p>
      </article>
    </section>
  </main>

  <script>
    const state = {
      mode: "percent"
    };

    const els = {
      moneyPoint: document.querySelector("#moneyPoint"),
      cashPoint: document.querySelector("#cashPoint"),
      accountCoins: document.querySelector("#accountCoins"),
      targetCash: document.querySelector("#targetCash"),
      percentMode: document.querySelector("#percentMode"),
      decimalMode: document.querySelector("#decimalMode"),
      suffixes: document.querySelectorAll(".modeSuffix"),
      cashPointFromMoney: document.querySelector("#cashPointFromMoney"),
      moneyPointFromCash: document.querySelector("#moneyPointFromCash"),
      moneyToCashFormula: document.querySelector("#moneyToCashFormula"),
      cashToMoneyFormula: document.querySelector("#cashToMoneyFormula"),
      cashByMoneyPoint: document.querySelector("#cashByMoneyPoint"),
      cashByCashPoint: document.querySelector("#cashByCashPoint"),
      cashDifference: document.querySelector("#cashDifference"),
      coinsByMoneyPoint: document.querySelector("#coinsByMoneyPoint"),
      coinsByCashPoint: document.querySelector("#coinsByCashPoint"),
      coinDifference: document.querySelector("#coinDifference"),
      moneyPointError: document.querySelector("#moneyPointError"),
      cashPointError: document.querySelector("#cashPointError"),
      consistencyNote: document.querySelector("#consistencyNote")
    };

    function parsePoint(input) {
      const raw = Number(input.value);
      if (!Number.isFinite(raw)) return NaN;
      return state.mode === "percent" ? raw / 100 : raw;
    }

    function parseAmount(input) {
      const raw = Number(input.value);
      return Number.isFinite(raw) ? raw : NaN;
    }

    function formatPoint(value) {
      if (!Number.isFinite(value)) return "--";
      if (state.mode === "percent") {
        return `${formatNumber(value * 100)}%`;
      }
      return formatNumber(value);
    }

    function formatMoney(value) {
      if (!Number.isFinite(value)) return "--";
      return formatNumber(value);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN", {
        maximumFractionDigits: 8
      }).format(value);
    }

    function setMode(nextMode) {
      if (state.mode === nextMode) return;
      const multiplier = nextMode === "percent" ? 100 : 0.01;
      [els.moneyPoint, els.cashPoint].forEach((input) => {
        const raw = Number(input.value);
        if (Number.isFinite(raw)) input.value = Number((raw * multiplier).toPrecision(12));
      });
      state.mode = nextMode;
      els.percentMode.classList.toggle("active", nextMode === "percent");
      els.decimalMode.classList.toggle("active", nextMode === "decimal");
      els.suffixes.forEach((suffix) => {
        suffix.textContent = nextMode === "percent" ? "%" : "小数";
      });
      calculate();
    }

    function calculate() {
      const moneyPoint = parsePoint(els.moneyPoint);
      const cashPoint = parsePoint(els.cashPoint);
      const accountCoins = parseAmount(els.accountCoins);
      const targetCash = parseAmount(els.targetCash);

      const convertedCashPoint = moneyPoint / (1 + moneyPoint);
      const convertedMoneyPoint = cashPoint / (1 - cashPoint);

      els.moneyPointError.textContent = "";
      els.cashPointError.textContent = "";

      if (!Number.isFinite(moneyPoint) || moneyPoint < 0) {
        els.moneyPointError.textContent = "货币点位需输入 0 或正数。";
      }

      if (!Number.isFinite(cashPoint) || cashPoint < 0 || cashPoint >= 1) {
        els.cashPointError.textContent = "现金点位必须大于等于 0 且小于 100%（小数模式小于 1）。";
      }

      els.cashPointFromMoney.textContent = moneyPoint >= 0 ? formatPoint(convertedCashPoint) : "--";
      els.moneyToCashFormula.textContent = moneyPoint >= 0
        ? `${formatPoint(moneyPoint)} / (1 + ${formatPoint(moneyPoint)}) = ${formatPoint(convertedCashPoint)}`
        : "--";

      els.moneyPointFromCash.textContent = cashPoint >= 0 && cashPoint < 1 ? formatPoint(convertedMoneyPoint) : "--";
      els.cashToMoneyFormula.textContent = cashPoint >= 0 && cashPoint < 1
        ? `${formatPoint(cashPoint)} / (1 - ${formatPoint(cashPoint)}) = ${formatPoint(convertedMoneyPoint)}`
        : "--";

      const canUseMoneyPoint = Number.isFinite(moneyPoint) && moneyPoint >= 0;
      const canUseCashPoint = Number.isFinite(cashPoint) && cashPoint > 0 && cashPoint < 1;
      const canUseCoins = Number.isFinite(accountCoins) && accountCoins >= 0;
      const canUseCash = Number.isFinite(targetCash) && targetCash >= 0;

      const cashByMoneyPoint = canUseMoneyPoint && canUseCoins ? accountCoins / (1 + moneyPoint) : NaN;
      const cashByCashPoint = canUseCashPoint && canUseCoins ? accountCoins * cashPoint : NaN;
      const coinsByMoneyPoint = canUseMoneyPoint && canUseCash ? targetCash * (1 + moneyPoint) : NaN;
      const coinsByCashPoint = canUseCashPoint && canUseCash ? targetCash / cashPoint : NaN;

      els.cashByMoneyPoint.textContent = formatMoney(cashByMoneyPoint);
      els.cashByCashPoint.textContent = formatMoney(cashByCashPoint);
      els.cashDifference.textContent = formatMoney(Math.abs(cashByMoneyPoint - cashByCashPoint));
      els.coinsByMoneyPoint.textContent = formatMoney(coinsByMoneyPoint);
      els.coinsByCashPoint.textContent = formatMoney(coinsByCashPoint);
      els.coinDifference.textContent = formatMoney(Math.abs(coinsByMoneyPoint - coinsByCashPoint));

      const syncedCashPoint = canUseMoneyPoint ? convertedCashPoint : NaN;
      const mismatch = canUseCashPoint && canUseMoneyPoint ? Math.abs(cashPoint - syncedCashPoint) : NaN;
      if (Number.isFinite(mismatch) && mismatch < 0.00000001) {
        els.consistencyNote.textContent = "当前输入的货币点位与现金点位互相匹配。注意：账户币 / (1 + 货币点位) 与账户币 × 现金点位仍是两条不同口径的公式。";
      } else if (Number.isFinite(mismatch)) {
        els.consistencyNote.textContent = `当前货币点位换算出的现金点位是 ${formatPoint(syncedCashPoint)}，与你输入的现金点位 ${formatPoint(cashPoint)} 不一致；模拟区会按各自输入分别计算。`;
      } else {
        els.consistencyNote.textContent = "请输入有效点位后，系统会自动检查两种点位是否匹配。";
      }
    }

    [els.moneyPoint, els.cashPoint, els.accountCoins, els.targetCash].forEach((input) => {
      input.addEventListener("input", calculate);
    });
    els.percentMode.addEventListener("click", () => setMode("percent"));
    els.decimalMode.addEventListener("click", () => setMode("decimal"));

    calculate();
  </script>
</body>
</html>

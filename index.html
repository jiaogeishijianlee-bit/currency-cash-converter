<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>货现转换计算</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #68707d;
      --line: #d9dee7;
      --panel: #ffffff;
      --paper: #f5f7fa;
      --accent: #116b5f;
      --accent-soft: #dff3ed;
      --warn: #9a4c00;
      --warn-soft: #fff1dc;
      --blue: #244f8f;
      --blue-soft: #e5eefb;
      --shadow: 0 14px 35px rgba(31, 41, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(17, 107, 95, 0.11), rgba(36, 79, 143, 0.08) 45%, rgba(154, 76, 0, 0.08)),
        var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      font-weight: 780;
    }

    .subhead {
      margin: 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .formula-pill {
      flex: 0 0 auto;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .panel {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel.wide {
      grid-column: 1 / -1;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .input-row {
      display: flex;
      align-items: center;
      min-height: 46px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      padding: 12px;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .suffix {
      flex: 0 0 auto;
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-left: 1px solid var(--line);
      color: var(--muted);
      background: #f9fafc;
      font-weight: 750;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f7;
    }

    .segmented button {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font: inherit;
      font-weight: 760;
      cursor: pointer;
    }

    .segmented button.active {
      color: var(--accent);
      background: #fff;
      box-shadow: 0 1px 4px rgba(17, 24, 39, 0.08);
    }

    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      background: var(--blue-soft);
      border: 1px solid rgba(36, 79, 143, 0.18);
    }

    .result strong {
      display: block;
      margin-bottom: 6px;
      color: var(--blue);
      font-size: 13px;
    }

    .value {
      overflow-wrap: anywhere;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .formula {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .simulation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .simulation-grid > div {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .mini-results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .mini-results.single {
      grid-template-columns: 1fr;
      margin-top: 0;
    }

    .metric {
      min-width: 0;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .metric span {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .metric b {
      display: block;
      overflow-wrap: anywhere;
      font-size: 21px;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .metric.warning {
      border-color: rgba(154, 76, 0, 0.28);
      background: var(--warn-soft);
    }

    .metric.warning span,
    .metric.warning b {
      color: var(--warn);
    }

    .metric.accent {
      border-color: rgba(17, 107, 95, 0.28);
      background: var(--accent-soft);
    }

    .metric.accent span,
    .metric.accent b {
      color: var(--accent);
    }

    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .primary-button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 820;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(17, 107, 95, 0.18);
    }

    .chain-formula {
      margin-top: 12px;
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .note {
      margin: 14px 0 0;
      padding: 12px 13px;
      border-left: 4px solid var(--warn);
      border-radius: 6px;
      background: rgba(255, 241, 220, 0.72);
      color: #6d3d0a;
      font-size: 13px;
      line-height: 1.6;
    }

    .error {
      margin-top: 8px;
      min-height: 18px;
      color: #b3261e;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 820px) {
      header,
      .layout,
      .simulation-grid,
      .mini-results {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .formula-pill {
        white-space: normal;
      }

      .action-row {
        align-items: stretch;
      }

      .primary-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>货现转换计算</h1>
        <p class="subhead">把货币点位和现金点位互相换算，并模拟账户币与现金之间的输入、反推结果。</p>
      </div>
      <div class="formula-pill">货币点位 / (1 + 货币点位) = 现金点位</div>
    </header>

    <section class="layout" aria-label="货现转换计算器">
      <article class="panel">
        <div class="panel-head">
          <h2>货币点位 → 现金点位</h2>
          <span class="badge">M→C</span>
        </div>
        <div class="controls">
          <label>
            输入货币点位
            <div class="input-row">
              <input id="moneyPoint" type="number" inputmode="decimal" step="0.0001" value="25" min="0">
              <span class="suffix modeSuffix">%</span>
            </div>
          </label>
        </div>
        <div class="result">
          <strong>现金点位</strong>
          <div class="value" id="cashPointFromMoney">--</div>
          <div class="formula" id="moneyToCashFormula">--</div>
        </div>
        <div class="error" id="moneyPointError"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>现金点位 → 货币点位</h2>
          <span class="badge">C→M</span>
        </div>
        <div class="controls">
          <label>
            输入现金点位
            <div class="input-row">
              <input id="cashPoint" type="number" inputmode="decimal" step="0.0001" value="20" min="0">
              <span class="suffix modeSuffix">%</span>
            </div>
          </label>
        </div>
        <div class="result">
          <strong>货币点位</strong>
          <div class="value" id="moneyPointFromCash">--</div>
          <div class="formula" id="cashToMoneyFormula">--</div>
        </div>
        <div class="error" id="cashPointError"></div>
      </article>

      <article class="panel wide">
        <div class="panel-head">
          <h2>账户币 / 现金模拟</h2>
          <div class="segmented" role="group" aria-label="输入模式">
            <button type="button" id="percentMode" class="active">百分比</button>
            <button type="button" id="decimalMode">小数</button>
          </div>
        </div>

        <div class="simulation-grid">
          <div>
            <div class="segmented" role="group" aria-label="账户币算现金点位类型">
              <button type="button" id="forwardMoneyType" class="active">货币点位</button>
              <button type="button" id="forwardCashType">现金点位</button>
            </div>
            <label>
              输入账户币
              <div class="input-row">
                <input id="accountCoins" type="number" inputmode="decimal" step="0.01" value="10000" min="0">
                <span class="suffix">币</span>
              </div>
            </label>
            <label>
              输入点位
              <div class="input-row">
                <input id="forwardPoint" type="number" inputmode="decimal" step="0.0001" value="25" min="0">
                <span class="suffix modeSuffix">%</span>
              </div>
            </label>
            <div class="mini-results single">
              <div class="metric accent">
                <span>得到现金</span>
                <b id="cashResult">--</b>
              </div>
            </div>
            <div class="formula" id="cashResultFormula">--</div>
            <div class="error" id="forwardError"></div>
          </div>

          <div>
            <div class="segmented" role="group" aria-label="现金反推账户币点位类型">
              <button type="button" id="reverseMoneyType" class="active">货币点位</button>
              <button type="button" id="reverseCashType">现金点位</button>
            </div>
            <label>
              输入现金
              <div class="input-row">
                <input id="targetCash" type="number" inputmode="decimal" step="0.01" value="8000" min="0">
                <span class="suffix">现金</span>
              </div>
            </label>
            <label>
              输入点位
              <div class="input-row">
                <input id="reversePoint" type="number" inputmode="decimal" step="0.0001" value="25" min="0">
                <span class="suffix modeSuffix">%</span>
              </div>
            </label>
            <div class="mini-results single">
              <div class="metric accent">
                <span>得到账户币</span>
                <b id="coinsResult">--</b>
              </div>
            </div>
            <div class="formula" id="coinsResultFormula">--</div>
            <div class="error" id="reverseError"></div>
          </div>
        </div>
      </article>

      <article class="panel wide">
        <div class="panel-head">
          <h2>一键式补点</h2>
          <span class="badge">补点</span>
        </div>

        <div class="simulation-grid">
          <label>
            输入原货币点位
            <div class="input-row">
              <input id="topUpMoneyPoint" type="number" inputmode="decimal" step="0.0001" value="25" min="0">
              <span class="suffix modeSuffix">%</span>
            </div>
          </label>
          <label>
            输入补点点位
            <div class="input-row">
              <input id="topUpPoint" type="number" inputmode="decimal" step="0.0001" value="5" min="0">
              <span class="suffix modeSuffix">%</span>
            </div>
          </label>
        </div>

        <div class="action-row">
          <button type="button" class="primary-button" id="topUpButton">一键计算</button>
        </div>

        <div class="mini-results">
          <div class="metric">
            <span>原现金点位</span>
            <b id="topUpOriginalCashPoint">--</b>
          </div>
          <div class="metric">
            <span>新现金点位</span>
            <b id="topUpNewCashPoint">--</b>
          </div>
          <div class="metric accent">
            <span>新货币点位</span>
            <b id="topUpNewMoneyPoint">--</b>
          </div>
        </div>

        <div class="chain-formula">
          <div id="topUpStepOne">--</div>
          <div id="topUpStepTwo">--</div>
          <div id="topUpStepThree">--</div>
        </div>
        <div class="error" id="topUpError"></div>
      </article>
    </section>
  </main>

  <script>
    const state = {
      mode: "percent",
      forwardPointType: "money",
      reversePointType: "money"
    };

    const els = {
      moneyPoint: document.querySelector("#moneyPoint"),
      cashPoint: document.querySelector("#cashPoint"),
      topUpMoneyPoint: document.querySelector("#topUpMoneyPoint"),
      topUpPoint: document.querySelector("#topUpPoint"),
      accountCoins: document.querySelector("#accountCoins"),
      forwardPoint: document.querySelector("#forwardPoint"),
      targetCash: document.querySelector("#targetCash"),
      reversePoint: document.querySelector("#reversePoint"),
      percentMode: document.querySelector("#percentMode"),
      decimalMode: document.querySelector("#decimalMode"),
      forwardMoneyType: document.querySelector("#forwardMoneyType"),
      forwardCashType: document.querySelector("#forwardCashType"),
      reverseMoneyType: document.querySelector("#reverseMoneyType"),
      reverseCashType: document.querySelector("#reverseCashType"),
      topUpButton: document.querySelector("#topUpButton"),
      suffixes: document.querySelectorAll(".modeSuffix"),
      cashPointFromMoney: document.querySelector("#cashPointFromMoney"),
      moneyPointFromCash: document.querySelector("#moneyPointFromCash"),
      moneyToCashFormula: document.querySelector("#moneyToCashFormula"),
      cashToMoneyFormula: document.querySelector("#cashToMoneyFormula"),
      cashResult: document.querySelector("#cashResult"),
      cashResultFormula: document.querySelector("#cashResultFormula"),
      coinsResult: document.querySelector("#coinsResult"),
      coinsResultFormula: document.querySelector("#coinsResultFormula"),
      topUpOriginalCashPoint: document.querySelector("#topUpOriginalCashPoint"),
      topUpNewCashPoint: document.querySelector("#topUpNewCashPoint"),
      topUpNewMoneyPoint: document.querySelector("#topUpNewMoneyPoint"),
      topUpStepOne: document.querySelector("#topUpStepOne"),
      topUpStepTwo: document.querySelector("#topUpStepTwo"),
      topUpStepThree: document.querySelector("#topUpStepThree"),
      moneyPointError: document.querySelector("#moneyPointError"),
      cashPointError: document.querySelector("#cashPointError"),
      forwardError: document.querySelector("#forwardError"),
      reverseError: document.querySelector("#reverseError"),
      topUpError: document.querySelector("#topUpError"),
    };

    function parsePoint(input) {
      const raw = Number(input.value);
      if (!Number.isFinite(raw)) return NaN;
      return state.mode === "percent" ? raw / 100 : raw;
    }

    function parseAmount(input) {
      const raw = Number(input.value);
      return Number.isFinite(raw) ? raw : NaN;
    }

    function formatPoint(value) {
      if (!Number.isFinite(value)) return "--";
      if (state.mode === "percent") {
        return `${formatNumber(value * 100)}%`;
      }
      return formatNumber(value);
    }

    function formatMoney(value) {
      if (!Number.isFinite(value)) return "--";
      return formatNumber(value);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN", {
        maximumFractionDigits: 8
      }).format(value);
    }

    function setMode(nextMode) {
      if (state.mode === nextMode) return;
      const multiplier = nextMode === "percent" ? 100 : 0.01;
      [els.moneyPoint, els.cashPoint, els.forwardPoint, els.reversePoint, els.topUpMoneyPoint, els.topUpPoint].forEach((input) => {
        const raw = Number(input.value);
        if (Number.isFinite(raw)) input.value = Number((raw * multiplier).toPrecision(12));
      });
      state.mode = nextMode;
      els.percentMode.classList.toggle("active", nextMode === "percent");
      els.decimalMode.classList.toggle("active", nextMode === "decimal");
      els.suffixes.forEach((suffix) => {
        suffix.textContent = nextMode === "percent" ? "%" : "小数";
      });
      calculate();
    }

    function setPointType(scope, type) {
      if (scope === "forward") {
        state.forwardPointType = type;
        els.forwardMoneyType.classList.toggle("active", type === "money");
        els.forwardCashType.classList.toggle("active", type === "cash");
      } else {
        state.reversePointType = type;
        els.reverseMoneyType.classList.toggle("active", type === "money");
        els.reverseCashType.classList.toggle("active", type === "cash");
      }
      calculate();
    }

    function calculate() {
      const moneyPoint = parsePoint(els.moneyPoint);
      const cashPoint = parsePoint(els.cashPoint);
      const forwardPoint = parsePoint(els.forwardPoint);
      const reversePoint = parsePoint(els.reversePoint);
      const topUpMoneyPoint = parsePoint(els.topUpMoneyPoint);
      const topUpPoint = parsePoint(els.topUpPoint);
      const accountCoins = parseAmount(els.accountCoins);
      const targetCash = parseAmount(els.targetCash);

      const convertedCashPoint = moneyPoint / (1 + moneyPoint);
      const convertedMoneyPoint = cashPoint / (1 - cashPoint);
      const topUpOriginalCashPoint = topUpMoneyPoint / (1 + topUpMoneyPoint);
      const topUpNewCashPoint = topUpOriginalCashPoint + topUpPoint;
      const topUpNewMoneyPoint = topUpNewCashPoint / (1 - topUpNewCashPoint);

      els.moneyPointError.textContent = "";
      els.cashPointError.textContent = "";
      els.forwardError.textContent = "";
      els.reverseError.textContent = "";
      els.topUpError.textContent = "";

      if (!Number.isFinite(moneyPoint) || moneyPoint < 0) {
        els.moneyPointError.textContent = "货币点位需输入 0 或正数。";
      }

      if (!Number.isFinite(cashPoint) || cashPoint < 0 || cashPoint >= 1) {
        els.cashPointError.textContent = "现金点位必须大于等于 0 且小于 100%（小数模式小于 1）。";
      }

      if (!Number.isFinite(topUpMoneyPoint) || topUpMoneyPoint < 0 || !Number.isFinite(topUpPoint) || topUpPoint < 0) {
        els.topUpError.textContent = "原货币点位和补点点位需输入 0 或正数。";
      } else if (topUpNewCashPoint >= 1) {
        els.topUpError.textContent = "新现金点位必须小于 100%（小数模式小于 1），否则无法反推货币点位。";
      }

      els.cashPointFromMoney.textContent = moneyPoint >= 0 ? formatPoint(convertedCashPoint) : "--";
      els.moneyToCashFormula.textContent = moneyPoint >= 0
        ? `${formatPoint(moneyPoint)} / (1 + ${formatPoint(moneyPoint)}) = ${formatPoint(convertedCashPoint)}`
        : "--";

      els.moneyPointFromCash.textContent = cashPoint >= 0 && cashPoint < 1 ? formatPoint(convertedMoneyPoint) : "--";
      els.cashToMoneyFormula.textContent = cashPoint >= 0 && cashPoint < 1
        ? `${formatPoint(cashPoint)} / (1 - ${formatPoint(cashPoint)}) = ${formatPoint(convertedMoneyPoint)}`
        : "--";

      const canUseCoins = Number.isFinite(accountCoins) && accountCoins >= 0;
      const canUseForwardMoneyPoint = state.forwardPointType === "money" && Number.isFinite(forwardPoint) && forwardPoint >= 0;
      const canUseForwardCashPoint = state.forwardPointType === "cash" && Number.isFinite(forwardPoint) && forwardPoint >= 0 && forwardPoint < 1;
      const canUseForward = canUseCoins && (canUseForwardMoneyPoint || canUseForwardCashPoint);
      const cashResult = state.forwardPointType === "money"
        ? accountCoins / (1 + forwardPoint)
        : accountCoins * (1 - forwardPoint);

      if (!Number.isFinite(accountCoins) || accountCoins < 0) {
        els.forwardError.textContent = "账户币需输入 0 或正数。";
      } else if (state.forwardPointType === "money" && (!Number.isFinite(forwardPoint) || forwardPoint < 0)) {
        els.forwardError.textContent = "货币点位需输入 0 或正数。";
      } else if (state.forwardPointType === "cash" && (!Number.isFinite(forwardPoint) || forwardPoint < 0 || forwardPoint >= 1)) {
        els.forwardError.textContent = "现金点位必须大于等于 0 且小于 100%（小数模式小于 1）。";
      }

      els.cashResult.textContent = canUseForward ? formatMoney(cashResult) : "--";
      els.cashResultFormula.textContent = canUseForward
        ? state.forwardPointType === "money"
          ? `${formatMoney(accountCoins)} / (1 + ${formatPoint(forwardPoint)}) = ${formatMoney(cashResult)}`
          : `${formatMoney(accountCoins)} × (1 - ${formatPoint(forwardPoint)}) = ${formatMoney(cashResult)}`
        : "--";

      const canUseCash = Number.isFinite(targetCash) && targetCash >= 0;
      const canUseReverseMoneyPoint = state.reversePointType === "money" && Number.isFinite(reversePoint) && reversePoint >= 0;
      const canUseReverseCashPoint = state.reversePointType === "cash" && Number.isFinite(reversePoint) && reversePoint >= 0 && reversePoint < 1;
      const canUseReverse = canUseCash && (canUseReverseMoneyPoint || canUseReverseCashPoint);
      const coinsResult = state.reversePointType === "money"
        ? targetCash * (1 + reversePoint)
        : targetCash / (1 - reversePoint);

      if (!Number.isFinite(targetCash) || targetCash < 0) {
        els.reverseError.textContent = "现金需输入 0 或正数。";
      } else if (state.reversePointType === "money" && (!Number.isFinite(reversePoint) || reversePoint < 0)) {
        els.reverseError.textContent = "货币点位需输入 0 或正数。";
      } else if (state.reversePointType === "cash" && (!Number.isFinite(reversePoint) || reversePoint < 0 || reversePoint >= 1)) {
        els.reverseError.textContent = "现金点位必须大于等于 0 且小于 100%（小数模式小于 1）。";
      }

      els.coinsResult.textContent = canUseReverse ? formatMoney(coinsResult) : "--";
      els.coinsResultFormula.textContent = canUseReverse
        ? state.reversePointType === "money"
          ? `${formatMoney(targetCash)} × (1 + ${formatPoint(reversePoint)}) = ${formatMoney(coinsResult)}`
          : `${formatMoney(targetCash)} / (1 - ${formatPoint(reversePoint)}) = ${formatMoney(coinsResult)}`
        : "--";

      const canUseTopUp = Number.isFinite(topUpMoneyPoint)
        && topUpMoneyPoint >= 0
        && Number.isFinite(topUpPoint)
        && topUpPoint >= 0
        && topUpNewCashPoint < 1;

      els.topUpOriginalCashPoint.textContent = canUseTopUp ? formatPoint(topUpOriginalCashPoint) : "--";
      els.topUpNewCashPoint.textContent = canUseTopUp ? formatPoint(topUpNewCashPoint) : "--";
      els.topUpNewMoneyPoint.textContent = canUseTopUp ? formatPoint(topUpNewMoneyPoint) : "--";
      els.topUpStepOne.textContent = canUseTopUp
        ? `1. ${formatPoint(topUpMoneyPoint)} / (1 + ${formatPoint(topUpMoneyPoint)}) = ${formatPoint(topUpOriginalCashPoint)}`
        : "--";
      els.topUpStepTwo.textContent = canUseTopUp
        ? `2. ${formatPoint(topUpOriginalCashPoint)} + ${formatPoint(topUpPoint)} = ${formatPoint(topUpNewCashPoint)}`
        : "--";
      els.topUpStepThree.textContent = canUseTopUp
        ? `3. ${formatPoint(topUpNewCashPoint)} / (1 - ${formatPoint(topUpNewCashPoint)}) = ${formatPoint(topUpNewMoneyPoint)}`
        : "--";

    }

    [els.moneyPoint, els.cashPoint, els.forwardPoint, els.reversePoint, els.topUpMoneyPoint, els.topUpPoint, els.accountCoins, els.targetCash].forEach((input) => {
      input.addEventListener("input", calculate);
    });
    els.topUpButton.addEventListener("click", calculate);
    els.percentMode.addEventListener("click", () => setMode("percent"));
    els.decimalMode.addEventListener("click", () => setMode("decimal"));
    els.forwardMoneyType.addEventListener("click", () => setPointType("forward", "money"));
    els.forwardCashType.addEventListener("click", () => setPointType("forward", "cash"));
    els.reverseMoneyType.addEventListener("click", () => setPointType("reverse", "money"));
    els.reverseCashType.addEventListener("click", () => setPointType("reverse", "cash"));

    calculate();
  </script>
</body>
</html>
